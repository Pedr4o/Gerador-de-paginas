<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Páginas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" href="style.css">

</head>



<body>
    <p  class="etiqueta">⚡DevClub -- Gerado com inteligência Artificial</p>

    <h1>
        Crie sua pagina
        <br>
        <span>com prompt</span>
    </h1>

    <p class="subtitulo">Descreva seu negócio e veja IA criar uma pagina profissional em segundos. 💥</p>

    <div class="caixa-entrada">

        <textarea class="texto-pagina"  placeholder="Descreva o seu negócio. Ex: Cafeteria, Mercado, e etc. ✅ "></textarea>

        <button onclick="gerarCodigo()">Gerar 🔥</button>

    </div>

    <div class="caixa-resultado">

        <p class="bloco-codigo"></p>
        
        <iframe class="bloco-site"></iframe>
    
    </div>



</body>


<script src="scripts.js"></script>

</html>
